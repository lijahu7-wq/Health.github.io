<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保健品介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin: 20px 0;
        }
        .item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .item h2 {
            color: #222;
            margin-bottom: 12px;
        }
        .item img {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            margin: 10px 0;
            display: block;
        }
        .info {
            line-height: 1.8;
            color: #333;
        }
        .info strong {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <h1>保健品介绍</h1>

    <!-- 示例保健品1 -->
    <div class="item">
        <h2>蛋白粉</h2>
        <img src="https://github.com/lijahu7-wq/images/1.jpg" alt="CranProbio">
        <div class="info">
            <strong>功效：</strong>补充优质蛋白质，增强免疫力，适合体质虚弱人群<br>
            <strong>用法：</strong>每日1-2次，每次1勺，温水冲服<br>
            <strong>注意：</strong>请勿用开水冲泡，避免破坏营养
        </div>
    </div>

    <!-- 示例保健品2 -->
    <div class="item">
        <h2>复合维生素片</h2>
        <img src="https://github.com/images/2.jpg" alt="复合维生素片">
        <div class="info">
            <strong>功效：</strong>补充多种维生素及矿物质，缓解疲劳<br>
            <strong>用法：</strong>每日1片，饭后温水送服<br>
            <strong>注意：</strong>不可过量服用，孕妇需遵医嘱
        </div>
    </div>

    <!-- 示例保健品3 -->
    <div class="item">
        <h2>碳酸钙D3片</h2>
        <img src="3.jpg" alt="碳酸钙D3片">
        <div class="info">
            <strong>功效：</strong>补钙强骨，预防骨质疏松<br>
            <strong>用法：</strong>每日2片，早晚各1片<br>
            <strong>注意：</strong>心肾功能不全者慎用，避免浓茶咖啡
        </div>
    </div>
</body>
</html>
